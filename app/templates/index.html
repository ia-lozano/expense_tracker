{% extends 'base.html' %}
{% block title %}Index{% endblock %}

{% block content %}
<div class="container-sm text-center">
    <h1>Expense Tracking App</h1>
    <p>Here you can register and track your expeses to organize and find 
        insights in your personal finance</p>
</div>
<div class="container mt-5">
    <!-- mx-auto auto applies right and left margin -->
    <div class="col-md-6 mx-auto">
        <div class="card">
            <div class="card-header text-center">
                <h2>Login</h2>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <!-- DO NOT FORGET METHOD POST -->
                     <!-- In this case we need add action="" because the login backend lives in '/' -->
                    <form method="post", action="{{ url_for('auth.login') }}">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="text-center">
                        <button type="submit" class="btn btn-primary">Sign In</button>
                        <div id="username" class="form-text">Don't have an account yet? <a href="{{ url_for('auth.signup') }}">Sign Up</a></div>
                        </div>
                </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
