<!DOCTYPE html>
<html lang="eng">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ExpenseTracker {% block title %}{% endblock %}</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('index') }}">ExpenseTracker</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNavAltMarkup">
            <div class="navbar-nav">
                <a class="nav-link" href="{{ url_for('auth.login') }}">Sign In</a>
                <a class="nav-link" href="{{ url_for('auth.signup') }}">Sign Up</a>
            </div>
            </div>
        </div>
        </nav>

        {% block content %}
        {% endblock %}

    {% for message in get_flashed_messages() %}
    <div class="container mt-3">
    <div class="row">
        <div class="col-md-6 mx-auto">
        <div class="alert alert-danger" role="alert">
            {{ message }}
        </div>
        </div>
    </div>
    </div>
    {% endfor %}

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
    <footer>
        <div class="container-fluid text-center py-3">
            <hr>
            <p>Made with: Flask / Chart.js<br>
            <a href="https://github.com/ia-lozano"> github.com/ia-lozano </a></p>
        </div>
    </footer>
</html>
