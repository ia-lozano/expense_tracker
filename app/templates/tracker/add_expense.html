{% extends 'tracker/base.html' %}

{%block content %}

<div class="container mt-5">
    <div class="row">
    <!-- mx-auto auto applies right and left margin -->
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header text-center">
                <h2>Add New Expense</h2>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <!-- DO NOT FORGET METHOD POST -->
                     <!-- Do not forget to add name= to the inputs, otherwise request.form won't no anything -->
                    <form method="post">
                        <div class="mb-3">
                            <label for="expense_type" class="form-label"></label>
                            <select id="expense_type" class="form-select" name="expense_type" required>
                                <!-- Fancy place holder -->
                                <option value="" selected disabled>
                                    Select a category...
                                </option>
                                <option value="Food">Food</option>
                                <option value="Rent - Home Loan">Rent - Home Loan</option>
                                <option value="Transportation">Transportation</option>
                                <option value="Housing">Housing</option>
                                <option value="Utilities">Utilities</option>
                                <option value="Education">Education</option>
                                <option value="Entertainment">Entertainment</option>
                                <option value="Healthcare">Healthcare</option>
                                <option value="Taxes">Taxes</option>
                                <option value="Cash Withdrawal">Cash Withdrawal</option>
                                <option value="Mobile Top Up">Mobile Top Up</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="amount" class="form-label">Amount</label>
                            <input type="number" class="form-control" id="amount" name="amount" step="0.01" min="0.01" required>
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">description</label>
                            <textarea id="description" name="description" class="form-control" maxlength="200"></textarea>
                        </div>
                        <div class="text-center">
                        <button type="submit" class="btn btn-success">Add</button>
                        </div>
                </form>
                </div>
            </div>
        </div>
    </div>
    </div>
</div>

{% endblock %}
