{% extends 'tracker/base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row">
    <!-- mx-auto auto applies right and left margin -->
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header text-center">
                <h2>Edit Expense</h2>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <!-- DO NOT FORGET METHOD POST -->
                     <!-- Do not forget to add name= to the inputs, otherwise request.form won't no anything -->
                    <form method="post">
                        <div class="mb-3">
                            <label for="expense_type" name="expense_type">Expense Type</label>
                            <button type="button" class="btn btn-outline-secondary" disabled>{{ expense.expense_type }}</button>
                        </div>
                        <div class="mb-3">
                            <label for="amount" class="form-label">Amount</label>
                            <input type="number" class="form-control" id="amount" name="amount" step="0.01" min="0.01" value="{{ expense.amount }}" required>
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">description</label>
                            <textarea id="description" name="description" class="form-control" maxlength="200">{{ expense.description }}</textarea>
                        </div>
                        <div class="text-center">
                        <button type="submit" class="btn btn-primary">Save</button>
                        </div>
                </form>
                </div>
            </div>
        </div>
    </div>
    </div>
</div>
{% endblock %}
